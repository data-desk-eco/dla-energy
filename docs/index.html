<!doctype html>
<notebook theme="midnight">
  <title>Sanctioned crude at DLA Energy jet-fuel contract refineries</title>

  <script id="last_updated" type="module" hidden>
    const lastUpdated = await FileAttachment("../data/last_updated.json").json();
    const commitDate = new Date(lastUpdated.date);
    const dateText = commitDate.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  </script>

  <script id="header" type="text/markdown">
    # Sanctioned crude at DLA Energy jet-fuel contract refineries
    *${dateText}*
  </script>

  <script id="intro" type="text/markdown">
    The US Defense Logistics Agency Energy (DLA-E) buys jet fuel at airports
    around the world under named contracts. Each contract identifies the
    *Fuel Source Location* — the refinery or storage terminal that the
    contracted *Refueler* lifts product from. The list below was compiled
    from DLA-E award documents for 31 overseas civil airports across 28
    countries.

    AML Global (registered in Hong Kong) holds one of these contracts:
    Bridgetown, Barbados, lifted from Ocean Point Terminals on St Croix in
    the US Virgin Islands. AML's Hong Kong head office is not itself an
    operational fuelling site.

    For each Fuel Source Location that has any seaborne footprint, the
    chart below traces the jet fuel arriving there since 1 January 2025
    and — for the refineries that produce it — the crude oil arriving
    there over the same period. Russian-, Iranian-, Venezuelan- and
    Sudanese-origin crude is flagged.
  </script>

  <script id="download_helper" type="module" hidden>
    function downloadCsv(data, filename) {
      if (!data || !data.length) return html``;
      const cols = Object.keys(data[0]);
      const csv = [cols.join(","), ...data.map(r => cols.map(c => {
        const v = r[c];
        return v == null ? "" : typeof v === "string" && (v.includes(",") || v.includes('"')) ? `"${v.replace(/"/g, '""')}"` : v;
      }).join(","))].join("\n");
      const blob = new Blob([csv], {type: "text/csv"});
      const url = URL.createObjectURL(blob);
      return html`<div style="text-align: right; margin-top: 0.3rem;"><a href="${url}" download="${filename}" style="font: 0.75rem/1 var(--sans-serif); color: var(--theme-foreground-muted); text-decoration: none; border-bottom: 1px solid var(--theme-foreground-muted);">Download data ↓</a></div>`;
    }
  </script>

  <script id="sankey_lib" type="module" hidden>
    const d3Sankey = await import("https://esm.sh/d3-sankey@0.12.3");
  </script>

  <script id="dla_sites_sql" output="dla_sites" type="application/sql" database="../data/data.duckdb" hidden>
    SELECT * FROM dla_sites
  </script>

  <script id="dla_untracked_sql" output="dla_untracked" type="application/sql" database="../data/data.duckdb" hidden>
    SELECT * FROM dla_untracked
  </script>

  <script id="contracts_sql" output="contracts" type="application/sql" database="../data/data.duckdb" hidden>
    SELECT
      "Country" AS country,
      "Airport" AS airport,
      "Parent Award" AS award,
      "Refueler" AS refueler,
      "Source" AS source,
      "Fuel Source Location" AS source_location,
      "Period of Performance" AS period
    FROM contracts
  </script>

  <script id="crude_in_sql" output="crude_in" type="application/sql" database="../data/data.duckdb" hidden>
    SELECT dest_installation_id AS inst_id,
           any_value(refinery_name(dest_installation)) AS refinery,
           origin_country,
           ROUND(SUM(mass_t)/1000, 1) AS kt
    FROM crude_trades
    WHERE COALESCE(grade,'') != 'CPC Kazakhstan'
    GROUP BY 1, 3
  </script>

  <script id="jet_in_sql" output="jet_in" type="application/sql" database="../data/data.duckdb" hidden>
    SELECT dest_installation_id AS dest_id,
           any_value(refinery_name(dest_installation)) AS dest_name,
           origin_installation_id AS up_id,
           any_value(refinery_name(origin_installation)) AS upstream,
           any_value(origin_country) AS up_country,
           ROUND(SUM(mass_t)/1000, 1) AS kt
    FROM jet_trades
    WHERE origin_installation_id IS NOT NULL
    GROUP BY 1, 3
  </script>

  <script id="filter_input" type="module">
    const sancFilter = view(Inputs.toggle({label: "Filter to sanctioned-origin flows", value: false}));
  </script>

  <script id="sankey_chart" type="module">
    const FLAGGED = new Set(["Russian Federation", "Iran", "Venezuela", "Sudan"]);
    const FLAG_LABEL = {
      "Russian Federation": "Russia",
      "Iran": "Iran",
      "Venezuela": "Venezuela",
      "Sudan": "Sudan",
    };

    const refineryRoles = new Map(dla_sites.map(s => [s.installation_id, s.role]));
    const refineryRefueler = d3.rollup(dla_sites, v => Array.from(new Set(v.map(d => d.refueler))).join(" / "), d => d.installation_id);
    const refineryAirports = d3.rollup(dla_sites, v => Array.from(new Set(v.map(d => d.airports))).join(" / "), d => d.installation_id);
    const terminalIds = new Set(dla_sites.filter(s => s.role === "terminal").map(s => s.installation_id));
    const refineryIds = new Set(dla_sites.filter(s => s.role === "refinery").map(s => s.installation_id));
    const dlaIds = new Set(dla_sites.map(s => s.installation_id));

    const totalCrudeByInstId = d3.rollup(crude_in, v => d3.sum(v, d => d.kt), d => d.inst_id);
    const crudeByInstId = d3.group(crude_in, d => d.inst_id);
    const crudeNameById = new Map(crude_in.map(d => [d.inst_id, d.refinery]));

    // Jet inflows to terminals → upstream refineries.
    const upstreamByTerminalId = d3.group(jet_in.filter(d => terminalIds.has(d.dest_id)), d => d.dest_id);
    // Jet inflows to refineries (incidental — usually finished jet re-imports).
    const jetInToRefineries = jet_in.filter(d => refineryIds.has(d.dest_id));

    const upstreamNameById = new Map(jet_in.map(d => [d.up_id, d.upstream]));

    function airportLabel(instId) {
      const a = refineryAirports.get(instId);
      return a ? a : "(no airport)";
    }

    function refineryDisplay(instId) {
      return crudeNameById.get(instId) || upstreamNameById.get(instId) || `installation ${instId}`;
    }

    const links = [];

    // For each DLA terminal: pro-rate upstream refineries' contribution.
    const terminalSankeyEntries = []; // {terminalId, terminalName, upstreamRefIds: Map(refId → ktContrib), unknownKt}
    for (const tid of terminalIds) {
      const terminalName = refineryDisplay(tid);
      const upstreamRows = upstreamByTerminalId.get(tid) || [];
      const upstreamTotal = d3.sum(upstreamRows, d => d.kt);
      // We use the "out-flow" as the terminal's jet inflow total — this is jet stored at the
      // DLA-listed terminal which the contract holder lifts. (We do not have a downstream
      // marine trade because uplift to the airport is by truck / pipeline, not vessel.)
      // So we treat the terminal's inflow as the total volume to attribute.
      const terminalIn = upstreamTotal; // kt
      const contrib = new Map();
      let unknown = 0;
      if (upstreamRows.length === 0) {
        unknown = terminalIn;
      } else {
        for (const r of upstreamRows) {
          contrib.set(r.up_id, (contrib.get(r.up_id) || 0) + r.kt);
        }
      }
      terminalSankeyEntries.push({tid, terminalName, contrib, unknown, terminalIn});
    }

    // Build refinery → DLA-source contributions.
    // For DLA refineries, the "DLA source" node is the refinery itself.
    // For DLA terminals, contributing upstream refineries flow into the terminal node.
    const allRefIds = new Set([
      ...refineryIds,
      ...new Set(terminalSankeyEntries.flatMap(e => [...e.contrib.keys()])),
    ]);

    function sancRatio(instId) {
      const total = totalCrudeByInstId.get(instId) || 0;
      if (total <= 0) return 0;
      const rows = crudeByInstId.get(instId) || [];
      const sanc = d3.sum(rows.filter(r => FLAGGED.has(r.origin_country)), r => r.kt);
      return sanc / total;
    }

    // 1. Sanctioned source → refinery (split by share of incoming crude)
    for (const refId of allRefIds) {
      const refName = refineryDisplay(refId);
      const totalCrude = totalCrudeByInstId.get(refId) || 0;
      // Determine the size of the bar coming out: how much jet this refinery
      // contributes to a DLA contract. Sum of (direct DLA-refinery throughput + terminal contribs).
      const directIn = refineryIds.has(refId)
        ? (jetInToRefineries.filter(d => d.dest_id === refId).reduce((s, d) => s + d.kt, 0))
        : 0;
      // For DLA refineries, we use the *crude* total as the size of the
      // refinery node (since that's what's processed), not the small jet
      // re-imports. The output to the airport node is then sized proportionally
      // — but to avoid an inflated chart, we cap the refinery node at a
      // representative scale via the total crude.
      // To keep proportions sane across the chart, we'll use total crude *or*
      // the sum of contributions to terminals, whichever sources we know.
      const terminalContribs = terminalSankeyEntries
        .flatMap(e => e.contrib.has(refId) ? [{tid: e.tid, kt: e.contrib.get(refId)}] : []);
      const refToTermTotal = d3.sum(terminalContribs, d => d.kt);

      // Refinery node size = max(refToTermTotal, directIn, totalCrude * 0 + small).
      // To keep the chart legible, scale the inflow size to match the outflow size
      // (so we use refToTermTotal + directIn as the refinery node weight).
      const nodeWeight = (refineryIds.has(refId)
        ? Math.max(totalCrude * 0.1, refToTermTotal + directIn || 0.1)
        : refToTermTotal);

      if (nodeWeight <= 0) continue;

      if (totalCrude <= 0) {
        links.push({source: "Pipeline/unknown", target: refName, value: nodeWeight, _kind: "source-ref"});
      } else {
        const byOrigin = new Map();
        for (const r of (crudeByInstId.get(refId) || [])) {
          const label = FLAGGED.has(r.origin_country) ? FLAG_LABEL[r.origin_country] : "Other seaborne crude";
          byOrigin.set(label, (byOrigin.get(label) || 0) + r.kt);
        }
        for (const [label, kt] of byOrigin) {
          const share = kt / totalCrude;
          if (share > 0) links.push({source: label, target: refName, value: share * nodeWeight, _kind: "source-ref"});
        }
      }

      // Refinery → DLA terminal contributions
      for (const {tid, kt} of terminalContribs) {
        const tName = refineryDisplay(tid);
        links.push({source: refName, target: tName, value: kt, _kind: "ref-term"});
      }

      // DLA-refinery → airport (for refineries that are themselves the DLA source).
      if (refineryIds.has(refId)) {
        const airport = airportLabel(refId);
        // We size this to the refinery node weight (so the bar matches in/out).
        links.push({source: refName, target: airport, value: nodeWeight, _kind: "ref-airport"});
      }
    }

    // Add "Unknown upstream" → terminal where no jet-inflow data attributes the source.
    for (const e of terminalSankeyEntries) {
      if (e.unknown > 0) {
        links.push({source: "Unknown upstream", target: e.terminalName, value: e.unknown, _kind: "source-ref"});
      }
      // DLA-terminal → airport
      const airport = airportLabel(e.tid);
      const tName = e.terminalName;
      const inSize = d3.sum([...e.contrib.values()]) + e.unknown;
      if (inSize > 0) links.push({source: tName, target: airport, value: inSize, _kind: "term-airport"});
    }

    // Sanctioned-share lookup for the filter.
    const refSanctShare = new Map();
    for (const refId of allRefIds) refSanctShare.set(refineryDisplay(refId), sancRatio(refId));
    const termSanctShare = new Map();
    for (const e of terminalSankeyEntries) {
      const upTotal = d3.sum([...e.contrib.values()]);
      let weighted = 0;
      for (const [upId, kt] of e.contrib) weighted += (kt / (upTotal || 1)) * (refSanctShare.get(refineryDisplay(upId)) || 0);
      termSanctShare.set(e.terminalName, weighted);
    }

    const sourceOrder = ["Russia", "Iran", "Venezuela", "Sudan", "Other seaborne crude", "Pipeline/unknown", "Unknown upstream"];
    const sancOrigins = new Set(["Russia", "Iran", "Venezuela", "Sudan"]);

    // Filtering.
    const refNameSet = new Set([...allRefIds].map(refineryDisplay));
    const termNameSet = new Set(terminalSankeyEntries.map(e => e.terminalName));
    const filtered = !sancFilter ? links : links.flatMap(l => {
      if (sancOrigins.has(l.source)) return [l];
      if (sourceOrder.includes(l.source)) return [];
      if (refNameSet.has(l.source)) {
        const r = refSanctShare.get(l.source) || 0;
        return r > 0 ? [{...l, value: l.value * r}] : [];
      }
      if (termNameSet.has(l.source)) {
        const r = termSanctShare.get(l.source) || 0;
        return r > 0 ? [{...l, value: l.value * r}] : [];
      }
      return [l];
    });

    const merged = d3.rollups(filtered, v => d3.sum(v, d => d.value), d => d.source, d => d.target)
      .flatMap(([s, ts]) => ts.map(([t, v]) => ({source: s, target: t, value: v})))
      .filter(d => d.value > 0.1);

    // Node ordering.
    const knownLeft = new Set(sourceOrder);
    const terminalNames = new Set(terminalSankeyEntries.map(e => e.terminalName));
    const refineryNames = [...allRefIds].map(refineryDisplay).filter(n => merged.some(d => d.source === n || d.target === n));
    const allTargets = new Set(merged.map(d => d.target));
    const airportNames = [...new Set([...refineryIds, ...terminalIds].map(airportLabel))]
      .filter(a => allTargets.has(a));

    const terminalActive = [...terminalNames].filter(n => merged.some(d => d.source === n || d.target === n));

    const nodeNames = [...sourceOrder, ...refineryNames, ...terminalActive, ...airportNames]
      .filter(n => merged.some(d => d.source === n || d.target === n));
    const nodeMap = new Map(nodeNames.map((name, i) => [name, i]));

    const graph = {
      nodes: nodeNames.map(name => ({name})),
      links: merged.map(d => ({
        source: nodeMap.get(d.source),
        target: nodeMap.get(d.target),
        value: d.value,
      })),
    };

    const chartWidth = Math.min(width, 1200);
    const chartHeight = Math.max(500, Math.max(refineryNames.length, airportNames.length) * 24);
    const margin = {top: 8, right: 8, bottom: 8, left: 8};

    function fixedAlign(node, n) {
      if (sourceOrder.includes(node.name)) return 0;
      if (terminalNames.has(node.name)) return 2;
      if (airportNames.includes(node.name)) return 3;
      return 1;
    }

    const sankey = d3Sankey.sankey()
      .nodeId(d => d.index)
      .nodeAlign(fixedAlign)
      .nodeWidth(12)
      .nodePadding(8)
      .extent([[margin.left, margin.top], [chartWidth - margin.right, chartHeight - margin.bottom]]);

    const {nodes, links: laidLinks} = sankey(graph);

    const sourceColor = {
      "Russia": "#d62728",
      "Iran": "#9467bd",
      "Venezuela": "#ff7f0e",
      "Sudan": "#e377c2",
      "Other seaborne crude": "#6c757d",
      "Pipeline/unknown": "#444",
      "Unknown upstream": "#444",
    };
    const destBase = "#1f77b4";

    function nodeColor(d) {
      if (sourceColor[d.name]) return sourceColor[d.name];
      if (airportNames.includes(d.name)) return destBase;
      if (terminalNames.has(d.name)) return "#5a6b7a";
      const inc = d.targetLinks || [];
      const total = d3.sum(inc, l => l.value);
      if (!total) return "#888";
      const flagged = d3.sum(inc.filter(l => sancOrigins.has(l.source.name)), l => l.value);
      const ratio = flagged / total;
      return d3.interpolateRgb("#6c757d", "#d62728")(Math.min(1, ratio * 1.4));
    }

    const container = d3.create("div").style("position", "relative");

    const svg = container.append("svg")
      .attr("viewBox", [0, 0, chartWidth, chartHeight])
      .attr("width", chartWidth)
      .attr("height", chartHeight)
      .attr("style", "max-width: 100%; height: auto; font: 11px var(--sans-serif); display: block;");

    const tooltip = container.append("div")
      .style("position", "absolute")
      .style("pointer-events", "none")
      .style("background", "var(--theme-background-alt, #1a1a1a)")
      .style("color", "var(--theme-foreground, #fff)")
      .style("border", "1px solid var(--theme-foreground-muted, #555)")
      .style("padding", "5px 8px")
      .style("font", "11px var(--sans-serif)")
      .style("border-radius", "3px")
      .style("white-space", "nowrap")
      .style("opacity", 0)
      .style("transition", "opacity 0.1s")
      .style("z-index", 10);

    function moveTooltip(event) {
      const rect = container.node().getBoundingClientRect();
      tooltip
        .style("opacity", 1)
        .style("left", (event.clientX - rect.left + 12) + "px")
        .style("top", (event.clientY - rect.top + 12) + "px");
    }
    function hideTooltip() { tooltip.style("opacity", 0); }

    svg.append("g")
      .selectAll("rect")
      .data(nodes)
      .join("rect")
        .attr("x", d => d.x0)
        .attr("y", d => d.y0)
        .attr("height", d => Math.max(1, d.y1 - d.y0))
        .attr("width", d => d.x1 - d.x0)
        .attr("fill", d => nodeColor(d))
        .attr("opacity", 0.9)
        .on("mouseenter mousemove", function(event, d) {
          tooltip.html(`<b>${d.name.trim()}</b><br>${d3.format(",.1f")(d.value)} kt`);
          moveTooltip(event);
        })
        .on("mouseleave", hideTooltip);

    svg.append("g")
        .attr("fill", "none")
      .selectAll("path")
      .data(laidLinks)
      .join("path")
        .attr("d", d3Sankey.sankeyLinkHorizontal())
        .attr("stroke", d => nodeColor(d.source))
        .attr("stroke-opacity", 0.35)
        .attr("stroke-width", d => Math.max(1, d.width))
        .on("mouseenter", function(event, d) {
          d3.select(this).attr("stroke-opacity", 0.6);
          const srcTotal = d.source.value;
          const sharePct = srcTotal ? d3.format(".1f")(100 * d.value / srcTotal) : null;
          tooltip.html(
            `<b>${d.source.name.trim()} → ${d.target.name.trim()}</b><br>` +
            `${d3.format(",.1f")(d.value)} kt` +
            (sharePct ? ` &middot; ${sharePct}% of ${d.source.name.trim()}` : "")
          );
          moveTooltip(event);
        })
        .on("mousemove", moveTooltip)
        .on("mouseleave", function() {
          d3.select(this).attr("stroke-opacity", 0.35);
          hideTooltip();
        });

    svg.append("g")
      .selectAll("text")
      .data(nodes)
      .join("text")
        .attr("x", d => d.x0 < chartWidth / 2 ? d.x1 + 4 : d.x0 - 4)
        .attr("y", d => (d.y0 + d.y1) / 2)
        .attr("dy", "0.35em")
        .attr("text-anchor", d => d.x0 < chartWidth / 2 ? "start" : "end")
        .attr("fill", "currentColor")
        .style("pointer-events", "none")
        .text(d => d.name.trim())
        .style("font-size", d => (d.y1 - d.y0) < 8 ? "0px" : "11px");

    display(container.node());
  </script>

  <script id="contracts_header" type="text/markdown">
    ## DLA Energy contract sites and their crude footprint

    *Sanctioned %* below is sanctioned crude (Russia / Iran / Venezuela /
    Sudan) as a share of *all* seaborne crude arriving at the refinery
    since 1 January 2025 — it is not the share of any single jet cargo.
    For storage terminals, the share is weighted by the upstream
    refineries that supplied them.
  </script>

  <script id="sites_table_sql" output="sites_table" type="application/sql" database="../data/data.duckdb" hidden>
    WITH crude_in AS (
      SELECT dest_installation_id AS inst_id,
             ROUND(SUM(mass_t)/1000, 1) AS crude_kt,
             ROUND(SUM(CASE WHEN origin_country = 'Russian Federation'
                             AND COALESCE(grade,'') != 'CPC Kazakhstan'
                        THEN mass_t END)/1000, 1) AS russia_kt,
             ROUND(SUM(CASE WHEN origin_country = 'Iran' THEN mass_t END)/1000, 1) AS iran_kt,
             ROUND(SUM(CASE WHEN origin_country = 'Venezuela' THEN mass_t END)/1000, 1) AS venezuela_kt,
             ROUND(SUM(CASE WHEN origin_country = 'Sudan' THEN mass_t END)/1000, 1) AS sudan_kt
      FROM crude_trades
      GROUP BY 1
    ),
    jet_in_dla AS (
      SELECT dest_installation_id AS inst_id,
             COUNT(*) AS jet_n,
             ROUND(SUM(mass_t)/1000, 1) AS jet_kt
      FROM jet_trades
      GROUP BY 1
    ),
    upstream_sanct AS (
      SELECT j.dest_installation_id AS inst_id,
             SUM(j.mass_t) AS up_total_mass,
             SUM(j.mass_t * COALESCE(
                 CASE WHEN c.crude_kt > 0 THEN
                   (COALESCE(c.russia_kt,0) + COALESCE(c.iran_kt,0)
                    + COALESCE(c.venezuela_kt,0) + COALESCE(c.sudan_kt,0)) / c.crude_kt
                 END, 0)) AS w_sanc
      FROM jet_trades j
      LEFT JOIN crude_in c ON c.inst_id = j.origin_installation_id
      WHERE j.origin_installation_id IS NOT NULL
      GROUP BY 1
    )
    SELECT
      s.refueler, s.airports,
      refinery_name(s.source_label) AS site,
      s.role,
      s.country_code AS country,
      ji.jet_n, ji.jet_kt,
      ci.crude_kt,
      ci.russia_kt, ci.iran_kt, ci.venezuela_kt, ci.sudan_kt,
      CASE
        WHEN s.role = 'refinery' AND ci.crude_kt > 0
          THEN ROUND(100.0 * (COALESCE(ci.russia_kt,0) + COALESCE(ci.iran_kt,0)
                            + COALESCE(ci.venezuela_kt,0) + COALESCE(ci.sudan_kt,0)) / ci.crude_kt, 1)
        WHEN s.role = 'terminal' AND us.up_total_mass > 0
          THEN ROUND(100.0 * us.w_sanc / us.up_total_mass, 1)
      END AS sanc_pct
    FROM dla_sites s
    LEFT JOIN crude_in ci ON ci.inst_id = s.installation_id
    LEFT JOIN jet_in_dla ji ON ji.inst_id = s.installation_id
    LEFT JOIN upstream_sanct us ON us.inst_id = s.installation_id
    ORDER BY sanc_pct DESC NULLS LAST
  </script>

  <script id="sites_table_render" type="module">
    const fmt = d3.format(",.0f");
    const fmt1 = d3.format(",.1f");
    const rows = sites_table
      .filter(r => !sancFilter || (r.sanc_pct != null && r.sanc_pct > 0))
      .map(r => ({
        Refueler: r.refueler,
        Airports: r.airports,
        Site: r.site,
        Kind: r.role,
        Country: r.country,
        "Jet kt in": r.jet_kt,
        "Crude kt in": r.crude_kt,
        "RU kt": r.russia_kt,
        "IR kt": r.iran_kt,
        "VE kt": r.venezuela_kt,
        "SD kt": r.sudan_kt,
        "Sanctioned %": r.sanc_pct,
      }));
    display(Inputs.table(rows, {
      rows: 40,
      sort: "Sanctioned %", reverse: true,
      width: {Refueler: 170, Airports: 180, Site: 220},
      format: {
        "Jet kt in": v => v == null ? "" : fmt1(v),
        "Crude kt in": v => v == null ? "" : fmt(v),
        "RU kt": v => v == null ? "" : fmt(v),
        "IR kt": v => v == null ? "" : fmt(v),
        "VE kt": v => v == null ? "" : fmt(v),
        "SD kt": v => v == null ? "" : fmt(v),
        "Sanctioned %": v => v == null ? "" : fmt1(v) + "%",
      },
    }));
    display(downloadCsv(rows, "dla-sites.csv"));
  </script>

  <script id="untracked_header" type="text/markdown">
    ### DLA contracts with no realistic seaborne footprint

    Six DLA contracts cover supply chains that don't appear in Kpler's
    marine data — landlocked refineries, pipeline-fed sites, or storage
    facilities at shut-down refineries.
  </script>

  <script id="sanctioned_header" type="text/markdown">
    ### Individual sanctioned-origin crude cargoes

    Every cargo of Russian, Iranian, Venezuelan or Sudanese crude
    discharging at a DLA-listed refinery (or at the upstream refineries
    that supplied DLA-listed storage terminals) since 1 January 2025.
    CPC Kazakhstan grade — Kazakh-origin blend that loads at Russian
    Black Sea ports — is excluded.
  </script>

  <script id="sanctioned_sql" output="sanctioned" type="application/sql" database="../data/data.duckdb" hidden>
    WITH r AS (
      SELECT DISTINCT installation_id AS inst_id FROM dla_sites WHERE role = 'refinery'
      UNION
      SELECT DISTINCT origin_installation_id AS inst_id
      FROM jet_trades
      WHERE dest_installation_id IN (SELECT installation_id FROM dla_sites WHERE role = 'terminal')
        AND origin_installation_id IS NOT NULL
    )
    SELECT
      "end"::DATE AS arrived,
      origin_country,
      origin_port,
      refinery_name(dest_installation) AS refinery,
      vessel_name,
      vessel_imo,
      seller,
      ROUND(mass_t/1000, 1) AS kt,
      grade
    FROM crude_trades
    WHERE dest_installation_id IN (SELECT inst_id FROM r)
      AND origin_country IN ('Iran', 'Venezuela', 'Sudan', 'Russian Federation')
      AND COALESCE(grade,'') != 'CPC Kazakhstan'
    ORDER BY arrived DESC
  </script>

    const searched = view(Inputs.search(sanctioned, {placeholder: "Filter cargoes…"}));
  </script>

  <script id="methodology" type="text/markdown">
    ## Methodology

    Contract details from DLA Energy award documents (SPE60725D0001, D0035,
    D0080, D0082, D0120, D0167, SPE60726D0053, SPE60723D0105). For each
    *Fuel Source Location* we identified the corresponding
    [Kpler](https://www.kpler.com/) installation by name, then pulled every
    seaborne trade record discharging there since 1 January 2025.

    For sites classified as *refinery* the crude inflows are read directly.
    For *terminals* (Ocean Point St Croix, ATT Tanjung Bin, Kipevu, Aqaba,
    Vopak Europoort, OQ Mina Al Fahal terminal), jet inflows identify the
    upstream refineries that supplied the stored product; crude is then
    pulled for each of those.

    Cargoes flagged as Russian-origin specifically exclude grade *CPC
    Kazakhstan*, a Kazakh-origin blend that loads at Russian Black Sea
    ports.

    Six DLA contracts have no marine footprint and are listed separately
    (landlocked refineries in Nepal/Uzbekistan, pipeline-fed Zambia,
    shut-down SAMIR Mohammedia in Morocco, Tanzanian downstream storage,
    Napa Napa Port Moresby refinery shut in 2024).
  </script>
